<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>My colour card</title>

    <style>

        /* Universal Selector-applies to everything on the page */
        * {

font-size:16px;
        }

        /* Element Selectors */
        body {
            background-color: rgb(249, 247, 215); 
        }

        h1 {
            color: rgb(84, 84, 113);
        }

h2 {
    color:gold;
}

p {
    color:rgb(66, 7, 7)
}

/* Class Selector */
.my-detail {
    color:rgb(63, 0, 100);
    font-weight: bold;
}

/* ID Selector */
#my-card {
    background-color: lightcyan;
}

    </style>
  </head>
  <body>

    <h1>My Colour Card</h1>

    <!-- Inline CSS: Add style="color:__;" inside this p tag -->
     <p style="color:rgb(8, 10, 103);" > Hi! This is my very own webpage.</p>

     <div id="my-card">

        <h2>About Me</h2>
        <p class="my-detail">My name is Sam.</p>
        <p class="my-detail">My favorite colour is red.</p>
        <p class="my-detail">My favourite subject is Maths.</p>
        <p class="my-detail">My favourite food is pizza.</p>

     </div>

     <h2>My favourite Things</h2>
     <p>My favourite animal is a cat.</p>
     <p>My favourite sport is football.</p>
     <p>My favourite movie is The Lion King.</p>

  </body>
</html>
